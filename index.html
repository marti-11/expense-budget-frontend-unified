<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        @keyframes squish {
            0%, 100% { transform: scale(1, 1); }
            50% { transform: scale(1.05, 0.95); }
        }

        @keyframes wobble {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(-2deg); }
            75% { transform: rotate(2deg); }
        }

        @keyframes float-wobble {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            25% { transform: translateY(-8px) rotate(-3deg); }
            50% { transform: translateY(-12px) rotate(0deg); }
            75% { transform: translateY(-8px) rotate(3deg); }
        }

        .animate-float-wobble {
            display: inline-block;
            animation: float-wobble 2.5s ease-in-out infinite;
        }

        .squish-effect:active {
            animation: squish 0.2s ease-in-out;
        }

        .wobble-hover:hover {
            animation: wobble 0.3s infinite ease-in-out;
        }

        .bg-wavy {
            background-color: #fcf9f8;
            background-image: radial-gradient(#ffd700 1.5px, transparent 1.5px);
            background-size: 32px 32px;
            opacity: 0.2;
        }

        .sticker-card {
            border: 4px solid #1b1c1c;
            box-shadow: 8px 8px 0px 0px rgba(27,28,28,1);
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .sticker-card:active {
            transform: translate(4px, 4px);
            box-shadow: 2px 2px 0px 0px rgba(27,28,28,1);
        }

        .input-sticker {
            border: 3px solid #1b1c1c;
            transition: all 0.2s ease;
        }

        .input-sticker:focus {
            outline: none;
            border-color: #8d00d9;
            transform: scale(1.02);
            box-shadow: 4px 4px 0px 0px #8d00d9;
        }
        
        .floating-stickers {
            position: absolute;
            pointer-events: none;
        }
    </style>
</head>
<body class="bg-background text-on-background font-body-md min-h-screen flex items-center justify-center p-margin-mobile md:p-margin-desktop overflow-x-hidden relative">
<!-- Subtle Background Pattern -->
<div class="fixed inset-0 bg-wavy -z-10"></div>
<!-- Animated Floating Elements for "Funhouse" vibe -->
<div class="floating-stickers top-10 left-10 text-secondary opacity-20 hidden lg:block" style="animation: wobble 4s infinite alternate">
<span class="material-symbols-outlined text-[120px]" style="font-variation-settings: 'FILL' 1;">celebration</span>
</div>
<div class="floating-stickers bottom-10 right-10 text-primary opacity-20 hidden lg:block" style="animation: wobble 3s infinite alternate-reverse">
<span class="material-symbols-outlined text-[100px]" style="font-variation-settings: 'FILL' 1;">payments</span>
</div>
<main class="w-full max-w-md relative">
<!-- Logo Section -->
<div class="flex flex-col items-center mb-8">
<div class="w-32 h-32 mb-4 hover:scale-110 transition-transform duration-300">
<img alt="Fizcal Funhouse Goofy Bank Logo" class="w-full h-full object-contain filter drop-shadow-[4px_4px_0px_rgba(27,28,28,1)]" src="https://lh3.googleusercontent.com/aida/AP1WRLtN97Z-PdBp83Nwhm_Za8rxG7kiWpda_X0JaEVyEdCFlLDOnOVSloQAVBI8nGkG_Lwc55KrivQ7wBxeh1ZdQczwy__m63Fn53jTWZ32ebSnUeikqUpuHWxllEL0C5uge3-6XBCL3ADQyjJUw51AaoGWuESnZujY4RC8Im-hrTs_wcArShCsgDortlfXoo3fzVpe-9_v-cM3GbbHDrGY8RBhfxkI54byB1nGcRAnCBXH6bvYf80tBt8Eu4E7"/>
</div>
<h1 class="font-headline-lg-mobile md:font-headline-lg text-headline-lg-mobile md:text-headline-lg text-center text-secondary-container">
                Welcome Back to the Funhouse!
            </h1>
<p class="font-body-lg text-body-lg text-on-surface-variant mt-2 text-center font-bold">
                Enter your secret keys to see your loot. <span class="animate-float-wobble">💰</span>
</p>
</div>
<!-- Login Card -->
<div class="bg-surface-container-lowest rounded-xl p-8 sticker-card">
<form id="login-form" class="space-y-6">
<!-- Email Field -->
<div class="space-y-2">
<label class="font-label-caps text-label-caps text-on-surface-variant ml-2" for="email">
                        Electronic Mail Address
    <input id="email"
       type="email"
       placeholder="you@funhouse.com" />

                    </label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant">alternate_email</span>
<input class="w-full pl-12 pr-6 py-4 bg-surface rounded-full input-sticker text-on-surface font-body-md" id="email" placeholder="you@funhouse.com" type="email"/>
</div>
</div>
<!-- Password Field -->

<div class="space-y-2">
<label class="font-label-caps text-label-caps text-on-surface-variant ml-2" for="password">
                        The Secret Code
                    </label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant">key</span>
<input class="w-full pl-12 pr-6 py-4 bg-surface rounded-full input-sticker text-on-surface font-body-md" id="password" placeholder="••••••••" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-secondary" type="button">
<span class="material-symbols-outlined">visibility</span>
</button>
</div>
</div>
<!-- Forgot Link -->
<div class="flex justify-end px-2">
<a class="font-label-caps text-label-caps text-secondary hover:underline transition-all" href="#">Lost your keys?</a>
</div>
<!-- CTA Button -->
<button class="w-full py-5 bg-primary-container text-on-primary-container font-headline-md text-headline-md rounded-full sticker-card flex items-center justify-center gap-3 hover:scale-[1.03] active:scale-95 transition-all group" type="submit">
                    Let Me In! 🎢
                    <span class="material-symbols-outlined group-hover:translate-x-1 transition-transform">arrow_forward_ios</span>
</button>
</form>
<!-- Social Login / Alternative -->
<div class="mt-8 pt-8 border-t-4 border-on-background/5 flex flex-col items-center gap-4">
<p class="font-label-caps text-label-caps text-on-surface-variant">Or log in with magic:</p>
<div class="flex gap-4">
<button class="w-14 h-14 bg-surface-container rounded-full border-2 border-on-background flex items-center justify-center hover:bg-secondary-fixed transition-colors squish-effect">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">auto_awesome</span>
</button>
<button class="w-14 h-14 bg-surface-container rounded-full border-2 border-on-background flex items-center justify-center hover:bg-primary-fixed transition-colors squish-effect">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">face</span>
</button>
</div>
</div>
</div>
<!-- Footer Link -->
<div class="mt-8 text-center">
<p class="font-body-md text-body-md">
                Not a member of the party yet? 
                <a class="text-secondary font-bold hover:underline underline-offset-4 decoration-4" href="#">Join the Funhouse</a>
</p>
</div>
</main>
<!-- Visual Flair: Stickers -->
<div class="fixed top-1/4 right-[5%] -rotate-12 hidden xl:block">
<div class="bg-primary text-on-primary p-4 rounded-xl border-4 border-on-background shadow-[6px_6px_0px_0px_rgba(27,28,28,1)] font-label-caps text-center">
            SAVE <br/> <span class="text-2xl">💰</span> <br/> BIG!
        </div>
</div>
<div class="fixed bottom-1/4 left-[5%] rotate-12 hidden xl:block">
<div class="bg-secondary-container text-on-secondary-container p-4 rounded-full border-4 border-on-background shadow-[6px_6px_0px_0px_rgba(27,28,28,1)] font-label-caps text-center">
            LOOT <br/> MODE <br/> ON!
        </div>
</div>
<script>
        // Simple micro-interaction for the password toggle
        document.querySelector('button[type="button"]').addEventListener('click', function() {
            const input = document.getElementById('password');
            const icon = this.querySelector('.material-symbols-outlined');
            if (input.type === 'password') {
                input.type = 'text';
                icon.innerText = 'visibility_off';
            } else {
                input.type = 'password';
                icon.innerText = 'visibility';
            }
        });

        // Add "wobble" to the card on load
        window.addEventListener('DOMContentLoaded', () => {
            const card = document.querySelector('.sticker-card');
            card.style.transform = 'rotate(-1deg) scale(0.95)';
            setTimeout(() => {
                card.style.transform = 'rotate(0deg) scale(1)';
            }, 500);
        });
    </script>
<script src="assets/js/api.js"></script>
<script src="assets/js/login.js"></script>
</body></html>
