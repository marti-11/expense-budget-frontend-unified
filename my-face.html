<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8" />

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    />

    <title>My Face | Fizcal Funhouse</title>

    <!-- Tailwind CSS -->
    <script
        src="https://cdn.tailwindcss.com?plugins=forms,container-queries"
    ></script>

    <!-- Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&family=Space+Grotesk:wght@700&family=Quicksand:wght@500;700&display=swap"
        rel="stylesheet"
    />

    <!-- Material Icons -->
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet"
    />

    <!-- Tailwind Configuration -->
    <script>
        tailwind.config = {
            darkMode: "class",

            theme: {
                extend: {
                    colors: {
                        "primary": "#705d00",
                        "primary-container": "#ffd700",
                        "primary-fixed": "#ffe16d",
                        "on-primary-container": "#705e00",

                        "secondary": "#8d00d9",
                        "secondary-container": "#aa30fa",
                        "secondary-fixed": "#f3daff",
                        "on-secondary": "#ffffff",

                        "tertiary": "#b12d00",
                        "tertiary-container": "#ffcfc2",
                        "tertiary-fixed": "#ffdbd1",

                        "error": "#ba1a1a",
                        "error-container": "#ffdad6",
                        "on-error-container": "#93000a",

                        "background": "#fcf9f8",
                        "surface": "#fcf9f8",
                        "surface-container-lowest": "#ffffff",
                        "surface-container-low": "#f6f3f2",
                        "surface-container": "#f0eded",
                        "surface-container-high": "#eae7e7",
                        "surface-container-highest": "#e4e2e1",

                        "on-background": "#1b1c1c",
                        "on-surface": "#1b1c1c",
                        "on-surface-variant": "#4d4732",
                        "outline": "#7e775f"
                    },

                    borderRadius: {
                        DEFAULT: "1rem",
                        lg: "2rem",
                        xl: "3rem",
                        full: "9999px"
                    },

                    spacing: {
                        "margin-mobile": "20px",
                        "margin-desktop": "40px",
                        "container-max": "1200px",
                        "gutter": "16px"
                    },

                    fontFamily: {
                        "headline-lg": [
                            "Plus Jakarta Sans"
                        ],

                        "headline-md": [
                            "Plus Jakarta Sans"
                        ],

                        "body-lg": [
                            "Quicksand"
                        ],

                        "body-md": [
                            "Quicksand"
                        ],

                        "label-caps": [
                            "Space Grotesk"
                        ]
                    },

                    fontSize: {
                        "headline-lg": [
                            "40px",
                            {
                                lineHeight: "48px",
                                fontWeight: "800"
                            }
                        ],

                        "headline-md": [
                            "24px",
                            {
                                lineHeight: "32px",
                                fontWeight: "700"
                            }
                        ],

                        "body-lg": [
                            "18px",
                            {
                                lineHeight: "28px",
                                fontWeight: "500"
                            }
                        ],

                        "body-md": [
                            "16px",
                            {
                                lineHeight: "24px",
                                fontWeight: "500"
                            }
                        ],

                        "label-caps": [
                            "12px",
                            {
                                lineHeight: "16px",
                                letterSpacing: "0.1em",
                                fontWeight: "700"
                            }
                        ]
                    }
                }
            }
        };
    </script>

    <style>
        html {
            scroll-behavior: smooth;
        }

        body {
            -webkit-tap-highlight-color: transparent;
        }

        .sticker-shadow {
            box-shadow:
                6px 6px 0 0 rgba(27, 28, 28, 1);
        }

        .sticker-shadow-sm {
            box-shadow:
                3px 3px 0 0 rgba(27, 28, 28, 1);
        }

        .active-press:active {
            transform: translate(3px, 3px);
            box-shadow: none;
        }

        .profile-card {
            border: 4px solid #1b1c1c;
        }

        .material-symbols-outlined {
            font-variation-settings:
                "FILL" 0,
                "wght" 500,
                "GRAD" 0,
                "opsz" 24;
        }
    </style>

    <!-- Shared Layout CSS -->
    <link
        href="assets/css/layout.css"
        rel="stylesheet"
    />
</head>

<body
    class="bg-background text-on-surface
           font-body-md min-h-screen overflow-x-hidden"
>
    <!-- Header generated by layout.js -->
    <div id="app-header"></div>

    <main
        class="max-w-container-max mx-auto
               px-margin-mobile py-8 pb-32"
    >
        <!-- Error message -->
        <div
            id="profile-error"
            role="alert"
            class="hidden mb-8
                   bg-error-container
                   text-on-error-container
                   border-4 border-error
                   rounded-lg p-4 font-bold"
        ></div>

        <!-- Profile Hero -->
        <section
            class="profile-card sticker-shadow
                   bg-primary-container rounded-lg
                   p-8 mb-12
                   flex flex-col md:flex-row
                   items-center gap-8"
        >
            <!-- Profile Image -->
            <div
                class="relative w-40 h-40
                       flex-shrink-0"
            >
                <div
                    id="profile-image-wrapper"
                    class="w-full h-full
                           bg-white border-4
                           border-on-surface rounded-full
                           overflow-hidden sticker-shadow-sm
                           flex items-center justify-center"
                >
                    <img
                        id="profile-image"
                        src=""
                        alt="Profile"
                        class="hidden w-full h-full
                               object-cover"
                    />

                    <span
                        id="profile-initials"
                        class="font-headline-lg
                               text-headline-lg
                               text-secondary"
                    >
                        ?
                    </span>
                </div>

                <div
                    class="absolute -bottom-2 -right-2
                           w-12 h-12
                           bg-secondary text-white
                           border-4 border-on-surface
                           rounded-full
                           flex items-center justify-center"
                >
                    <span class="material-symbols-outlined">
                        person
                    </span>
                </div>
            </div>

            <!-- Name and Email -->
            <div
                class="flex-grow text-center md:text-left"
            >
                <p
                    class="font-label-caps
                           text-label-caps
                           text-secondary mb-2"
                >
                    Your profile
                </p>

                <h1
                    id="profile-full-name"
                    class="font-headline-lg
                           text-headline-lg
                           text-on-primary-container"
                >
                    Loading...
                </h1>

                <p
                    id="profile-email"
                    class="font-body-lg
                           text-body-lg
                           text-on-primary-container mt-2"
                >
                    Loading email...
                </p>

                <button
                    id="profile-refresh"
                    type="button"
                    class="mt-6 inline-flex
                           items-center gap-2
                           bg-secondary text-white
                           border-2 border-on-surface
                           rounded-full px-6 py-3
                           font-bold sticker-shadow-sm
                           active-press"
                >
                    <span class="material-symbols-outlined">
                        refresh
                    </span>

                    Refresh Profile
                </button>
            </div>
        </section>

        <!-- Profile Information -->
        <section>
            <div class="flex items-center gap-4 mb-6">
                <h2
                    class="font-headline-md
                           text-headline-md
                           bg-secondary text-white
                           border-2 border-on-surface
                           rounded-lg px-4 py-1 -rotate-1"
                >
                    Personal Information
                </h2>

                <div
                    class="flex-grow h-1
                           bg-on-surface opacity-10
                           rounded-full"
                ></div>
            </div>

            <div
                class="grid grid-cols-1
                       md:grid-cols-2 gap-6"
            >
                <!-- First Name -->
                <article
                    class="profile-card sticker-shadow-sm
                           bg-white rounded-lg p-6
                           flex items-center gap-4"
                >
                    <div
                        class="w-14 h-14
                               bg-primary-fixed
                               border-2 border-on-surface
                               rounded-full
                               flex items-center justify-center"
                    >
                        <span
                            class="material-symbols-outlined
                                   text-primary text-3xl"
                        >
                            badge
                        </span>
                    </div>

                    <div>
                        <p
                            class="font-label-caps
                                   text-label-caps
                                   text-on-surface-variant"
                        >
                            First name
                        </p>

                        <p
                            id="profile-first-name"
                            class="font-headline-md
                                   text-headline-md"
                        >
                            Loading...
                        </p>
                    </div>
                </article>

                <!-- Last Name -->
                <article
                    class="profile-card sticker-shadow-sm
                           bg-white rounded-lg p-6
                           flex items-center gap-4"
                >
                    <div
                        class="w-14 h-14
                               bg-secondary-fixed
                               border-2 border-on-surface
                               rounded-full
                               flex items-center justify-center"
                    >
                        <span
                            class="material-symbols-outlined
                                   text-secondary text-3xl"
                        >
                            signature
                        </span>
                    </div>

                    <div>
                        <p
                            class="font-label-caps
                                   text-label-caps
                                   text-on-surface-variant"
                        >
                            Last name
                        </p>

                        <p
                            id="profile-last-name"
                            class="font-headline-md
                                   text-headline-md"
                        >
                            Loading...
                        </p>
                    </div>
                </article>

                <!-- Email -->
                <article
                    class="profile-card sticker-shadow-sm
                           bg-white rounded-lg p-6
                           flex items-center gap-4"
                >
                    <div
                        class="w-14 h-14
                               bg-tertiary-fixed
                               border-2 border-on-surface
                               rounded-full
                               flex items-center justify-center"
                    >
                        <span
                            class="material-symbols-outlined
                                   text-tertiary text-3xl"
                        >
                            mail
                        </span>
                    </div>

                    <div class="min-w-0">
                        <p
                            class="font-label-caps
                                   text-label-caps
                                   text-on-surface-variant"
                        >
                            Email
                        </p>

                        <p
                            id="profile-email-detail"
                            class="font-headline-md
                                   text-headline-md
                                   break-all"
                        >
                            Loading...
                        </p>
                    </div>
                </article>

                <!-- Phone -->
                <article
                    class="profile-card sticker-shadow-sm
                           bg-white rounded-lg p-6
                           flex items-center gap-4"
                >
                    <div
                        class="w-14 h-14
                               bg-primary-fixed
                               border-2 border-on-surface
                               rounded-full
                               flex items-center justify-center"
                    >
                        <span
                            class="material-symbols-outlined
                                   text-primary text-3xl"
                        >
                            phone
                        </span>
                    </div>

                    <div>
                        <p
                            class="font-label-caps
                                   text-label-caps
                                   text-on-surface-variant"
                        >
                            Phone number
                        </p>

                        <p
                            id="profile-phone"
                            class="font-headline-md
                                   text-headline-md"
                        >
                            Loading...
                        </p>
                    </div>
                </article>

                <!-- Currency -->
                <article
                    class="profile-card sticker-shadow-sm
                           bg-white rounded-lg p-6
                           flex items-center gap-4"
                >
                    <div
                        class="w-14 h-14
                               bg-secondary-fixed
                               border-2 border-on-surface
                               rounded-full
                               flex items-center justify-center"
                    >
                        <span
                            class="material-symbols-outlined
                                   text-secondary text-3xl"
                        >
                            euro
                        </span>
                    </div>

                    <div>
                        <p
                            class="font-label-caps
                                   text-label-caps
                                   text-on-surface-variant"
                        >
                            Currency
                        </p>

                        <p
                            id="profile-currency"
                            class="font-headline-md
                                   text-headline-md"
                        >
                            Loading...
                        </p>
                    </div>
                </article>

                <!-- User ID -->
                <article
                    class="profile-card sticker-shadow-sm
                           bg-white rounded-lg p-6
                           flex items-center gap-4"
                >
                    <div
                        class="w-14 h-14
                               bg-tertiary-fixed
                               border-2 border-on-surface
                               rounded-full
                               flex items-center justify-center"
                    >
                        <span
                            class="material-symbols-outlined
                                   text-tertiary text-3xl"
                        >
                            fingerprint
                        </span>
                    </div>

                    <div>
                        <p
                            class="font-label-caps
                                   text-label-caps
                                   text-on-surface-variant"
                        >
                            User ID
                        </p>

                        <p
                            id="profile-user-id"
                            class="font-headline-md
                                   text-headline-md"
                        >
                            Loading...
                        </p>
                    </div>
                </article>
            </div>
        </section>
    </main>

    <!-- Mobile navbar generated by layout.js -->
    <div id="app-navbar"></div>

    <!-- Authentication -->
    <script src="assets/js/auth-guard.js"></script>

    <!-- API helper -->
    <script src="assets/js/api.js"></script>

    <!-- Shared layout -->
    <script src="assets/js/layout.js"></script>

    <!-- Profile logic -->
    <script src="assets/js/profile.js"></script>
</body></html>
